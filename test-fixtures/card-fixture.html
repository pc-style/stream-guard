<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stream Guard Card Fixture</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ece7dc;
      color: #201b16;
    }
    .card {
      width: min(900px, calc(100vw - 48px));
      padding: clamp(28px, 5vw, 56px);
      border-radius: 34px;
      background: #fffaf0;
      border: 2px solid #201b16;
      box-shadow: 18px 18px 0 #201b16;
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 14px;
      font-weight: 800;
      color: #8a4b19;
    }
    h1 {
      margin: 12px 0 24px;
      font-size: clamp(42px, 8vw, 92px);
      line-height: 0.92;
      letter-spacing: -0.06em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      font-size: clamp(22px, 3vw, 40px);
      font-weight: 750;
    }
    .item {
      padding: 18px;
      border: 2px solid #201b16;
      border-radius: 20px;
      background: #f5d35f;
    }
    .item:nth-child(2) { background: #f38c6b; }
    .item:nth-child(3) { background: #93d6a4; }
    .item:nth-child(4) { background: #8db4f4; }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">OCR fixture: high contrast card</div>
    <h1>Private Stream Notes</h1>
    <section class="grid">
      <div class="item">Email: producer@example.com</div>
      <div class="item">Phone: 555.987.6543</div>
      <div class="item">URL: private.example.test/admin</div>
      <div class="item">Phrase: bad phrase</div>
    </section>
  </main>
</body>
</html>
