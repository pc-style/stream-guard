<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stream Guard Safe Control Fixture</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f7fb;
      color: #172033;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(900px, calc(100vw - 48px));
      padding: 48px;
      border-radius: 28px;
      background: white;
      box-shadow: 0 24px 80px rgba(23, 32, 51, 0.12);
    }
    h1 {
      font-size: clamp(38px, 7vw, 82px);
      margin: 0 0 18px;
      letter-spacing: -0.05em;
    }
    p {
      font-size: clamp(20px, 3vw, 34px);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <h1>Safe Control Page</h1>
    <p>This page has normal text, product copy, and no phone numbers, emails, or blocklisted phrases. Use it to confirm Stream Guard clears after the sensitive fixture is gone.</p>
  </main>
</body>
</html>
