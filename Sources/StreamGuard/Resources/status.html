<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Guard Status</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #141b24;
      --text: #e8eef7;
      --muted: #8b9bb4;
      --clear: #3dd68c;
      --suspect: #f5a524;
      --armed: #ff5d5d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1a2433, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .card {
      width: min(860px, 100%);
      background: var(--panel);
      border: 1px solid #243041;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    .subtitle { color: var(--muted); margin-bottom: 1.5rem; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.75rem;
    }
    .dot { width: 0.65rem; height: 0.65rem; border-radius: 50%; background: currentColor; }
    .state-clear { color: var(--clear); background: rgba(61, 214, 140, 0.12); }
    .state-suspect { color: var(--suspect); background: rgba(245, 165, 36, 0.12); }
    .state-armed { color: var(--armed); background: rgba(255, 93, 93, 0.12); }
    .grid { display: grid; gap: 0.75rem; margin-top: 1.25rem; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 0;
      border-top: 1px solid #243041;
    }
    .label { color: var(--muted); }
    .events {
      margin-top: 1.25rem;
      max-height: 220px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.82rem;
      background: #0f141c;
      border-radius: 10px;
      padding: 0.75rem;
    }
    .event { padding: 0.25rem 0; color: #c5d2e5; }
    details.debug {
      margin-top: 1rem;
      border-top: 1px solid #243041;
      padding-top: 1rem;
    }
    summary {
      cursor: pointer;
      color: var(--muted);
      user-select: none;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0.5rem 0 0;
      padding: 0.75rem;
      background: #080c12;
      border: 1px solid #243041;
      border-radius: 10px;
      color: #d7e2f2;
      max-height: 180px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Stream Guard</h1>
    <p class="subtitle">Local monitoring status</p>
    <div id="badge" class="badge state-clear"><span class="dot"></span><span id="state">clear</span></div>
    <div class="grid">
      <div class="row"><span class="label">Last match</span><span id="lastMatch">—</span></div>
      <div class="row"><span class="label">Updated</span><span id="timestamp">—</span></div>
      <div class="row"><span class="label">Monitoring</span><span id="monitoring">—</span></div>
      <div class="row"><span class="label">OCR frames</span><span id="ocrFrames">0</span></div>
      <div class="row"><span class="label">Last OCR</span><span id="lastOCRAt">—</span></div>
      <div class="row"><span class="label">OCR latency</span><span id="ocrLatency">—</span></div>
      <div class="row"><span class="label">Snapshot</span><span id="snapshotLatency">—</span></div>
      <div class="row"><span class="label">Preprocess</span><span id="preprocessLatency">—</span></div>
      <div class="row"><span class="label">Last frame</span><span id="lastFrameAt">—</span></div>
      <div class="row"><span class="label">Connection</span><span id="connection">connecting…</span></div>
    </div>
    <details class="debug">
      <summary>Show OCR debug text (hide this while testing the screen)</summary>
      <div class="label" style="margin-top: 0.75rem;">Last OCR text</div>
      <pre id="lastOCRText">—</pre>
      <div class="label" style="margin-top: 0.75rem;">Merged detection buffer</div>
      <pre id="mergedText">—</pre>
    </details>
    <div id="events" class="events"></div>
  </main>
  <script>
    const badge = document.getElementById("badge");
    const stateEl = document.getElementById("state");
    const lastMatchEl = document.getElementById("lastMatch");
    const timestampEl = document.getElementById("timestamp");
    const monitoringEl = document.getElementById("monitoring");
    const ocrFramesEl = document.getElementById("ocrFrames");
    const lastOCRAtEl = document.getElementById("lastOCRAt");
    const ocrLatencyEl = document.getElementById("ocrLatency");
    const snapshotLatencyEl = document.getElementById("snapshotLatency");
    const preprocessLatencyEl = document.getElementById("preprocessLatency");
    const lastFrameAtEl = document.getElementById("lastFrameAt");
    const lastOCRTextEl = document.getElementById("lastOCRText");
    const mergedTextEl = document.getElementById("mergedText");
    const connectionEl = document.getElementById("connection");
    const eventsEl = document.getElementById("events");

    function renderStatus(data) {
      const state = (data.state || "clear").toLowerCase();
      stateEl.textContent = state;
      badge.className = "badge state-" + state;
      lastMatchEl.textContent = data.lastMatch || "—";
      timestampEl.textContent = data.timestamp
        ? new Date(data.timestamp * 1000).toLocaleTimeString()
        : "—";
      monitoringEl.textContent = data.monitoring ? "yes" : "no";
      ocrFramesEl.textContent = data.ocrFrames ?? 0;
      lastOCRAtEl.textContent = data.lastOCRAt
        ? new Date(data.lastOCRAt * 1000).toLocaleTimeString()
        : "—";
      ocrLatencyEl.textContent = typeof data.lastOCRLatencyMS === "number"
        ? `${Math.round(data.lastOCRLatencyMS)} ms`
        : "—";
      snapshotLatencyEl.textContent = typeof data.lastSnapshotDurationMS === "number"
        ? `${Math.round(data.lastSnapshotDurationMS)} ms`
        : "—";
      preprocessLatencyEl.textContent = typeof data.lastPreprocessDurationMS === "number"
        ? `${Math.round(data.lastPreprocessDurationMS)} ms`
        : "—";
      lastFrameAtEl.textContent = data.lastFrameReceivedAt
        ? new Date(data.lastFrameReceivedAt * 1000).toLocaleTimeString()
        : "—";
      lastOCRTextEl.textContent = data.lastOCRText || "—";
      mergedTextEl.textContent = data.mergedText || "—";
    }

    function pushEvent(text) {
      const div = document.createElement("div");
      div.className = "event";
      div.textContent = text;
      eventsEl.prepend(div);
    }

    async function loadStatus() {
      try {
        const res = await fetch("/status", { cache: "no-store" });
        renderStatus(await res.json());
        if (connectionEl.textContent !== "live") connectionEl.textContent = "polling";
      } catch {
        connectionEl.textContent = "offline";
      }
    }

    function connectWebSocket() {
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${protocol}://${location.host}/events`);
      ws.onopen = () => {
        connectionEl.textContent = "live";
      };
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.event === "state_change") {
          renderStatus(data);
          pushEvent(`${new Date().toLocaleTimeString()} ${data.previous} → ${data.state}`);
        } else {
          renderStatus(data);
        }
      };
      ws.onclose = () => {
        connectionEl.textContent = "reconnecting…";
        setTimeout(connectWebSocket, 1500);
      };
    }

    loadStatus();
    setInterval(loadStatus, 500);
    connectWebSocket();
  </script>
</body>
</html>
